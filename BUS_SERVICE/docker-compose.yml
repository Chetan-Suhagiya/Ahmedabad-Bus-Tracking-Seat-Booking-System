services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: citybus-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-citybus-jwt-secret-2024}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      CORS_ORIGIN: "*"
      DATASET_PATH: /app/data/dataset.csv
    volumes:
      # Dataset CSV lives here (read)
      - ./backend/data:/app/data
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: citybus-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
