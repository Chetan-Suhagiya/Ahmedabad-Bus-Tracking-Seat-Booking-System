version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: citybus-db
    environment:
      POSTGRES_DB: citybus
      POSTGRES_USER: citybus_user
      POSTGRES_PASSWORD: citybus_pass
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citybus_user -d citybus"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: citybus-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://citybus_user:citybus_pass@db:5432/citybus
      JWT_SECRET: change-me-in-env
      CORS_ORIGIN: http://localhost:5173
      DATASET_PATH: /app/data/dataset.csv
    volumes:
      - ./backend/data:/app/data
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
    container_name: citybus-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  db_data:
